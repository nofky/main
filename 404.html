<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Halaman Tidak Ditemukan</title>
    <meta name="robots" content="noindex, follow">
    
    <script src="/theme.js"></script>

    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: #0b1220; /* Menyamakan warna latar belakang global */
            color: #fff;
        }
        .box {
            background: #111a2e;
            padding: 45px 30px;
            border-radius: 18px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }
        .box h1 {
            font-size: 80px;
            color: #22c55e; /* Mengubah angka 404 menjadi warna hijau terang agar kontras */
            margin-bottom: 10px;
            line-height: 1;
        }
        .box h2 {
            font-size: 24px;
            color: #fff; /* Memastikan teks berwarna putih terang */
            margin-bottom: 15px;
        }
        .box p {
            color: #cbd5e1;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .box .btn {
            display: inline-block;
            padding: 12px 24px;
            background: #22c55e;
            color: #fff !important; /* Memaksa teks tombol tetap berwarna putih */
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }
        .box .btn:hover {
            opacity: 0.9;
        }
        footer {
            margin-top: 30px;
        }
        @media(max-width: 600px) {
            .box h1 { font-size: 60px; }
            .box h2 { font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>404</h1>
        <h2>Halaman Tidak Ditemukan</h2>
        <p>Maaf, halaman yang Anda tuju tidak tersedia, telah dihapus, atau alamat URL yang Anda masukkan salah.</p>
        
        <a class="btn" href="/index.html">Kembali ke Homepage</a>
    </div>

</body>
</html>
